<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0DBD8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg)"/>
  
  <!-- Matrix room grid -->
  <g opacity="0.08">
    <rect x="100" y="100" width="1000" height="200" rx="4" fill="#0DBD8B"/>
  </g>
  
  <!-- Encryption lock icon -->
  <g transform="translate(200, 200)">
    <rect x="-40" y="-50" width="80" height="70" rx="8" fill="#0DBD8B" opacity="0.2"/>
    <rect x="-30" y="-40" width="60" height="50" rx="4" fill="none" stroke="#0DBD8B" stroke-width="2"/>
    <path d="M-15,-40 L-15,-55 C-15,-70 15,-70 15,-55 L15,-40" fill="none" stroke="#0DBD8B" stroke-width="2"/>
    <circle cx="0" cy="-15" r="6" fill="#0DBD8B"/>
    <rect x="-2" y="-12" width="4" height="10" fill="#0f172a"/>
  </g>
  
  <!-- Announcement flow -->
  <g transform="translate(500, 200)">
    <!-- Bot -->
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="rgba(255,255,255,0.05)" stroke="#0DBD8B" stroke-width="1.5"/>
    <text x="0" y="-10" font-family="'SF Mono', monospace" font-size="12" fill="#0DBD8B" text-anchor="middle">BOT</text>
    <text x="0" y="10" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">/announce</text>
    
    <!-- Arrows to members -->
    <line x1="60" y1="-20" x2="140" y2="-60" stroke="#0DBD8B" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="60" y1="0" x2="140" y2="0" stroke="#0DBD8B" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="60" y1="20" x2="140" y2="60" stroke="#0DBD8B" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Members -->
  <g transform="translate(750, 140)">
    <rect x="-30" y="-25" width="60" height="50" rx="6" fill="rgba(255,255,255,0.05)" stroke="#334155" stroke-width="1"/>
    <text x="0" y="5" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Member 1</text>
    <text x="0" y="20" font-family="sans-serif" font-size="14" fill="#10b981" text-anchor="middle">✅</text>
  </g>
  <g transform="translate(750, 200)">
    <rect x="-30" y="-25" width="60" height="50" rx="6" fill="rgba(255,255,255,0.05)" stroke="#334155" stroke-width="1"/>
    <text x="0" y="5" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Member 2</text>
    <text x="0" y="20" font-family="sans-serif" font-size="14" fill="#10b981" text-anchor="middle">✅</text>
  </g>
  <g transform="translate(750, 260)">
    <rect x="-30" y="-25" width="60" height="50" rx="6" fill="rgba(255,255,255,0.05)" stroke="#334155" stroke-width="1"/>
    <text x="0" y="5" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Member 3</text>
    <text x="0" y="20" font-family="sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">⏳</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="60" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="700">Element Announce Bot</text>
  <text x="600" y="85" font-family="'SF Pro Text', -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Encrypted team announcements with engagement tracking</text>
  
  <rect x="300" y="380" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  <text x="600" y="395" font-family="'SF Mono', monospace" font-size="11" fill="#64748b" text-anchor="middle">E2EE • CLI + GUI • Retraction • Test Mode</text>
</svg>